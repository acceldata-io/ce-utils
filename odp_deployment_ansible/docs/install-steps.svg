<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 110" role="img" aria-labelledby="steps-title steps-desc" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title id="steps-title">ODP Installation Steps</title>
  <desc id="steps-desc">Five-step installation workflow: Setup (install Ansible and collections), Inventory (define cluster nodes and host groups), Secrets (set passwords and encrypt vault), Configure (versions, DB, Java, blueprint topology), and Deploy (run install_cluster.sh), resulting in a ready ODP cluster on Ambari port 8080.</desc>
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#b0bec5"/></marker>
  </defs>
  <rect width="900" height="110" fill="#f8f9fa" rx="10"/>

  <!-- Step 1 -->
  <rect x="12" y="12" width="128" height="86" rx="10" fill="#fff" stroke="#43a047" stroke-width="2" filter="url(#ds)"/>
  <circle cx="36" cy="34" r="13" fill="#43a047"/>
  <text x="36" y="39" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <text x="56" y="38" fill="#2e7d32" font-size="11" font-weight="700">Setup</text>
  <text x="22" y="58" fill="#546e7a" font-size="8.5">Install Ansible</text>
  <text x="22" y="72" fill="#546e7a" font-size="8.5">Install collections</text>
  <text x="22" y="86" fill="#9e9e9e" font-size="7.5">workstation</text>

  <line x1="140" y1="55" x2="158" y2="55" stroke="#b0bec5" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="162" y="12" width="128" height="86" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2" filter="url(#ds)"/>
  <circle cx="186" cy="34" r="13" fill="#1565c0"/>
  <text x="186" y="39" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
  <text x="206" y="38" fill="#0d47a1" font-size="11" font-weight="700">Inventory</text>
  <text x="172" y="58" fill="#546e7a" font-size="8.5">Define cluster nodes</text>
  <text x="172" y="72" fill="#546e7a" font-size="8.5">Map host_groups</text>
  <text x="172" y="86" fill="#9e9e9e" font-size="7.5">inventory/static</text>

  <line x1="290" y1="55" x2="308" y2="55" stroke="#b0bec5" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="312" y="12" width="128" height="86" rx="10" fill="#fff" stroke="#c62828" stroke-width="2" filter="url(#ds)"/>
  <circle cx="336" cy="34" r="13" fill="#c62828"/>
  <text x="336" y="39" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <text x="356" y="38" fill="#b71c1c" font-size="11" font-weight="700">Secrets</text>
  <text x="322" y="58" fill="#546e7a" font-size="8.5">Set passwords</text>
  <text x="322" y="72" fill="#546e7a" font-size="8.5">Encrypt vault</text>
  <text x="322" y="86" fill="#9e9e9e" font-size="7.5">vault.yml</text>

  <line x1="440" y1="55" x2="458" y2="55" stroke="#b0bec5" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="462" y="12" width="128" height="86" rx="10" fill="#fff" stroke="#ef6c00" stroke-width="2" filter="url(#ds)"/>
  <circle cx="486" cy="34" r="13" fill="#ef6c00"/>
  <text x="486" y="39" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <text x="506" y="38" fill="#e65100" font-size="11" font-weight="700">Configure</text>
  <text x="472" y="58" fill="#546e7a" font-size="8.5">Versions, DB, Java</text>
  <text x="472" y="72" fill="#546e7a" font-size="8.5">Blueprint topology</text>
  <text x="472" y="86" fill="#9e9e9e" font-size="7.5">group_vars/all</text>

  <line x1="590" y1="55" x2="608" y2="55" stroke="#b0bec5" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="612" y="12" width="128" height="86" rx="10" fill="#fff" stroke="#7b1fa2" stroke-width="2" filter="url(#ds)"/>
  <circle cx="636" cy="34" r="13" fill="#7b1fa2"/>
  <text x="636" y="39" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
  <text x="656" y="38" fill="#6a1b9a" font-size="11" font-weight="700">Deploy</text>
  <text x="622" y="58" fill="#546e7a" font-size="8.5">install_cluster.sh</text>
  <text x="622" y="72" fill="#546e7a" font-size="8.5">--ask-vault-pass</text>
  <text x="622" y="86" fill="#9e9e9e" font-size="7.5">automated</text>

  <line x1="740" y1="55" x2="758" y2="55" stroke="#b0bec5" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Result -->
  <rect x="762" y="12" width="128" height="86" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#ds)"/>
  <text x="826" y="42" text-anchor="middle" fill="#1b5e20" font-size="18" font-weight="700">ODP</text>
  <text x="826" y="62" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="600">Cluster Ready</text>
  <text x="826" y="80" text-anchor="middle" fill="#66bb6a" font-size="9">Ambari :8080</text>
</svg>
