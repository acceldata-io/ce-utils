<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 340" role="img" aria-labelledby="topo-title topo-desc" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title id="topo-title">3-Node HA Topology</title>
  <desc id="topo-desc">Three-node high-availability cluster layout showing service placement across odp-master01, odp-master02, and odp-master03 with NameNode HA, ResourceManager HA, and HBase Master HA.</desc>
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="740" height="340" fill="#f8f9fa" rx="10"/>
  <text x="370" y="24" text-anchor="middle" fill="#1a237e" font-size="14" font-weight="700">3-Node HA Topology</text>
  <text x="370" y="40" text-anchor="middle" fill="#78909c" font-size="10">group_vars/all_3_node_ha  |  NameNode HA + ResourceManager HA + HBase HA</text>

  <!-- HA badge -->
  <rect x="308" y="50" width="124" height="18" rx="9" fill="#c62828"/>
  <text x="370" y="63" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">HIGH AVAILABILITY</text>

  <!-- Node 1 -->
  <rect x="16" y="78" width="228" height="244" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="16" y="78" width="228" height="28" rx="8" fill="#1565c0"/>
  <rect x="16" y="94" width="228" height="12" fill="#1565c0"/>
  <text x="130" y="96" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">odp-master01</text>
  <text x="130" y="126" text-anchor="middle" fill="#455a64" font-size="9" font-weight="600">Ambari + Master Services</text>

  <rect x="28" y="136" width="100" height="18" rx="9" fill="#e8f5e9" stroke="#43a047" stroke-width="0.8"/>
  <text x="78" y="149" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="600">AMBARI</text>
  <rect x="136" y="136" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="186" y="149" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">NAMENODE</text>
  <rect x="28" y="160" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="78" y="173" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">ZKFC</text>
  <rect x="136" y="160" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="186" y="173" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">JOURNALNODE</text>
  <rect x="28" y="184" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="72" y="197" text-anchor="middle" font-size="8" font-weight="600"><tspan fill="#0d47a1">RESOURCEMGR</tspan><tspan fill="#c62828" font-size="6"> HA</tspan></text>
  <rect x="136" y="184" width="100" height="18" rx="9" fill="#fce4ec" stroke="#c62828" stroke-width="0.8"/>
  <text x="186" y="197" text-anchor="middle" fill="#b71c1c" font-size="8" font-weight="600">RANGER</text>
  <rect x="28" y="208" width="100" height="18" rx="9" fill="#fce4ec" stroke="#c62828" stroke-width="0.8"/>
  <text x="78" y="221" text-anchor="middle" fill="#b71c1c" font-size="8" font-weight="600">RANGER KMS</text>
  <rect x="136" y="208" width="100" height="18" rx="9" fill="#fce4ec" stroke="#c62828" stroke-width="0.8"/>
  <text x="186" y="221" text-anchor="middle" fill="#b71c1c" font-size="8" font-weight="600">KNOX</text>
  <rect x="28" y="232" width="100" height="18" rx="9" fill="#fff3e0" stroke="#ef6c00" stroke-width="0.8"/>
  <text x="72" y="245" text-anchor="middle" font-size="8" font-weight="600"><tspan fill="#e65100">HBASE MASTER</tspan><tspan fill="#c62828" font-size="6"> HA</tspan></text>
  <rect x="136" y="232" width="100" height="18" rx="9" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="186" y="245" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="600">ZOOKEEPER</text>
  <rect x="28" y="256" width="208" height="18" rx="9" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="132" y="269" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="600">INFRA SOLR + TIMELINE + HISTORY</text>
  <text x="130" y="298" text-anchor="middle" fill="#bdbdbd" font-size="8">+ All clients</text>

  <!-- Node 2 -->
  <rect x="256" y="78" width="228" height="244" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="256" y="78" width="228" height="28" rx="8" fill="#1565c0"/>
  <rect x="256" y="94" width="228" height="12" fill="#1565c0"/>
  <text x="370" y="96" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">odp-master02</text>
  <text x="370" y="126" text-anchor="middle" fill="#455a64" font-size="9" font-weight="600">Standby NameNode + Hive</text>

  <rect x="268" y="136" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="318" y="149" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">NAMENODE</text>
  <rect x="376" y="136" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="426" y="149" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">ZKFC</text>
  <rect x="268" y="160" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="318" y="173" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">JOURNALNODE</text>
  <rect x="376" y="160" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="420" y="173" text-anchor="middle" font-size="8" font-weight="600"><tspan fill="#0d47a1">RESOURCEMGR</tspan><tspan fill="#c62828" font-size="6"> HA</tspan></text>
  <rect x="268" y="184" width="100" height="18" rx="9" fill="#fff3e0" stroke="#ef6c00" stroke-width="0.8"/>
  <text x="318" y="197" text-anchor="middle" fill="#e65100" font-size="8" font-weight="600">HIVE SERVER</text>
  <rect x="376" y="184" width="100" height="18" rx="9" fill="#fff3e0" stroke="#ef6c00" stroke-width="0.8"/>
  <text x="426" y="197" text-anchor="middle" fill="#e65100" font-size="8" font-weight="600">METASTORE</text>
  <rect x="268" y="208" width="100" height="18" rx="9" fill="#fff3e0" stroke="#ef6c00" stroke-width="0.8"/>
  <text x="312" y="221" text-anchor="middle" font-size="8" font-weight="600"><tspan fill="#e65100">HBASE MASTER</tspan><tspan fill="#c62828" font-size="6"> HA</tspan></text>
  <rect x="376" y="208" width="100" height="18" rx="9" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="426" y="221" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="600">ZOOKEEPER</text>
  <text x="370" y="262" text-anchor="middle" fill="#bdbdbd" font-size="8">+ All clients</text>

  <!-- Node 3 -->
  <rect x="496" y="78" width="228" height="244" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="496" y="78" width="228" height="28" rx="8" fill="#1565c0"/>
  <rect x="496" y="94" width="228" height="12" fill="#1565c0"/>
  <text x="610" y="96" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">odp-master03</text>
  <text x="610" y="126" text-anchor="middle" fill="#455a64" font-size="9" font-weight="600">Worker + Data</text>

  <rect x="508" y="136" width="100" height="18" rx="9" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="558" y="149" text-anchor="middle" fill="#0d47a1" font-size="8" font-weight="600">JOURNALNODE</text>
  <rect x="616" y="136" width="100" height="18" rx="9" fill="#e0f2f1" stroke="#00897b" stroke-width="0.8"/>
  <text x="666" y="149" text-anchor="middle" fill="#00695c" font-size="8" font-weight="600">DATANODE</text>
  <rect x="508" y="160" width="100" height="18" rx="9" fill="#e0f2f1" stroke="#00897b" stroke-width="0.8"/>
  <text x="558" y="173" text-anchor="middle" fill="#00695c" font-size="8" font-weight="600">NODEMANAGER</text>
  <rect x="616" y="160" width="100" height="18" rx="9" fill="#fff3e0" stroke="#ef6c00" stroke-width="0.8"/>
  <text x="666" y="173" text-anchor="middle" fill="#e65100" font-size="8" font-weight="600">HBASE RS</text>
  <rect x="508" y="184" width="100" height="18" rx="9" fill="#fff3e0" stroke="#ef6c00" stroke-width="0.8"/>
  <text x="558" y="197" text-anchor="middle" fill="#e65100" font-size="8" font-weight="600">OOZIE</text>
  <rect x="616" y="184" width="100" height="18" rx="9" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="666" y="197" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="600">ZOOKEEPER</text>
  <text x="610" y="238" text-anchor="middle" fill="#bdbdbd" font-size="8">+ All clients</text>

  <!-- NameNode HA connector (through gap between nodes) -->
  <line x1="234" y1="145" x2="270" y2="145" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="252" y="140" text-anchor="middle" fill="#c62828" font-size="7" font-weight="700">HA</text>
</svg>
