[defaults]
inventory=inventory/static
collections_path=./collections:~/.ansible/collections:/usr/share/ansible/collections
vault_password_file=.vault_password
forks=40
# Security: Disable host key checking (only for dynamic cloud environments)
# Consider using known_hosts management in production
host_key_checking = False
timeout = 60
ansible_keep_remote_files = False
deprecation_warnings=True
# YAML-formatted output using the built-in default callback
stdout_callback = ansible.builtin.default
callback_result_format = yaml
# Only gather facts when needed (improves performance)
gathering = smart
# Prevent retry file clutter
retry_files_enabled = False
# Cleaner output by hiding skipped hosts
display_skipped_hosts = False
# Python 3 compatibility
interpreter_python = auto_silent
# Error handling
action_warnings = True
command_warnings = True
# Strategy for task execution
# Note: 'free' strategy doesn't support add_host module, so using 'linear' (default)
# 'linear' executes tasks sequentially per host, 'free' allows parallel execution
# but has limitations with certain modules like add_host
strategy = linear
# Display OK hosts in output
display_ok_hosts = True

[privilege_escalation]
# Default privilege escalation (used frequently in playbooks)
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Enable SSH connection multiplexing for better performance
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=60 -o ServerAliveCountMax=3
retries=3
# Enable pipelining to reduce SSH round trips
pipelining=True
# Increase timeout for long-running operations
timeout = 60
