---
- name: Install the ambari-server package
  ansible.builtin.package:
    name: ambari-server
    state: present
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Validate JDBC driver exists
  ansible.builtin.stat:
    path: "{{ jdbc_driver_path }}"
  register: ambari_server_jdbc_check

- name: Fail if JDBC driver not found
  ansible.builtin.fail:
    msg: "JDBC driver not found at '{{ jdbc_driver_path }}'. Ensure the driver is installed on the Ambari server node."
  when: not ambari_server_jdbc_check.stat.exists

- name: Load Ambari schema into PostgreSQL
  when: database == "postgres"
  block:
    - name: Load the Ambari Server schema (postgres)
      no_log: true
      community.postgresql.postgresql_db:
        name: "{{ database_options.ambari_db_name }}"
        maintenance_db: "{{ database_options.ambari_db_name }}"
        login_host: "{{ database_options.external_hostname }}"
        login_port: "{{ postgres_port }}"
        login_user: "{{ database_options.ambari_db_username }}"
        login_password: "{{ database_options.ambari_db_password }}"
        state: restore
        target: /var/lib/ambari-server/resources/Ambari-DDL-Postgres-CREATE.sql

- name: Load Ambari schema into MySQL or MariaDB
  when: database == "mysql" or database == "mariadb"
  block:
    - name: Load the Ambari Server schema (mysql/mariadb)
      no_log: true
      community.mysql.mysql_db:
        name: "{{ database_options.ambari_db_name }}"
        login_host: "{{ database_options.external_hostname }}"
        login_port: "{{ mysql_port }}"
        login_user: "{{ database_options.ambari_db_username }}"
        login_password: "{{ database_options.ambari_db_password }}"
        state: import
        target: /var/lib/ambari-server/resources/Ambari-DDL-MySQL-CREATE.sql
      register: ambari_server_import_results
      # Re-runs are safe: MySQL/MariaDB raises "Table '…' already exists" when the schema is
      # already present. Any other failure (connection, auth, syntax, constraint) must surface.
      failed_when: >-
        ambari_server_import_results is failed and
        'already exists' not in (ambari_server_import_results.msg | default('') | lower)
  rescue:
    # Surface a redacted error message so operators can see WHAT failed without
    # exposing the password. community.mysql.mysql_db's .msg never contains the
    # password (only host/user/db name and the server-returned error text).
    - name: Show redacted MySQL/MariaDB schema-load failure
      ansible.builtin.fail:
        msg: >-
          Ambari schema load against {{ database_options.external_hostname }}
          (db={{ database_options.ambari_db_name }}, user={{ database_options.ambari_db_username }}) failed:
          {{ ambari_server_import_results.msg | default('no message returned — check the mysql/mariadb server log') }}

- name: Load Ambari schema into Oracle
  when: database == "oracle" and oracle_load_ambari_schema | default(true) | bool
  block:
    - name: Load the Ambari Server schema (oracle)
      no_log: true
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          export ORACLE_HOME={{ oracle_home }}
          export ORACLE_SID={{ oracle_sid }}
          export LD_LIBRARY_PATH={{ oracle_home }}/instantclient/instantclient:{{ oracle_home }}/lib:$LD_LIBRARY_PATH
          export PATH={{ oracle_home }}/instantclient/instantclient:{{ oracle_home }}/bin:$PATH
          CONN_STR="{{ database_options.ambari_db_username }}/{{ database_options.ambari_db_password }}"
          CONN_STR="${CONN_STR}@//{{ database_options.external_hostname | default(ansible_fqdn, true) }}"
          CONN_STR="${CONN_STR}:{{ oracle_port }}/{{ oracle_sid }}"
          echo "WHENEVER SQLERROR EXIT SQL.SQLCODE
          @/var/lib/ambari-server/resources/Ambari-DDL-Oracle-CREATE.sql
          EXIT" | sqlplus -S "${CONN_STR}"
        executable: /bin/bash
      register: ambari_server_oracle_ddl
      # sqlplus exits with the SQLCODE when WHENEVER SQLERROR is set. ORA-00955 (rc 955) means
      # a schema object already exists — that's the idempotent re-run case, not a failure.
      # Any other non-zero rc indicates a real SQL error and must fail the task.
      failed_when: >-
        ambari_server_oracle_ddl.rc != 0 and
        ambari_server_oracle_ddl.rc != 955
      changed_when: ambari_server_oracle_ddl.rc == 0
      environment:
        ORACLE_SID: "{{ oracle_sid }}"
        ORACLE_HOME: "{{ oracle_home }}"

- name: Configure the Ambari JDBC driver
  ansible.builtin.command: >-
    /usr/sbin/ambari-server setup
    --jdbc-db={{ database | regex_replace('mariadb', 'mysql') }}
    --jdbc-driver={{ jdbc_driver_path }}
  register: ambari_server_jdbc_setup
  # Ambari prints "Copying" on first install and "Updating" when the driver is refreshed;
  # on a no-op re-run the output only reports "already exists", so we report unchanged.
  changed_when: >-
    'Copying' in ambari_server_jdbc_setup.stdout or
    'Updating' in ambari_server_jdbc_setup.stdout
  notify: Restart ambari-server

- name: Set the Ambari Server database setup options (oracle)
  no_log: true
  ansible.builtin.set_fact:
    ambari_server_database_options: >-
      --database=oracle
      --databasehost={{ database_options.external_hostname | default(ansible_fqdn, true) }}
      --databaseport={{ oracle_port }}
      --databasename={{ oracle_sid }}
      --databaseusername={{ database_options.ambari_db_username }}
      --databasepassword={{ database_options.ambari_db_password }}
  when: database == "oracle"

- name: Set the Ambari Server database setup options
  no_log: true
  ansible.builtin.set_fact:
    ambari_server_database_options: >-
      --database={{ database | regex_replace('mariadb', 'mysql') }}
      --databasehost={{ database_options.external_hostname | default(ansible_fqdn, true) }}
      --databaseport={{ lookup('vars', database | regex_replace('mariadb', 'mysql') + '_port') }}
      --databasename={{ database_options.ambari_db_name }}
      --databaseusername={{ database_options.ambari_db_username }}
      --databasepassword={{ database_options.ambari_db_password }}
  when: database != "embedded" and database != "oracle"

- name: Set the Ambari Server Java setup option
  ansible.builtin.set_fact:
    ambari_server_java_options: >-
      -j {{ ambari_java_home }}
      {% if 'java-17' in ambari_java_home %}
      --ambari-java-home {{ ambari_java_home }}
      --stack-java-home {{ java_home }}
      {% endif %}
  when: java == "openjdk" or java == "custom"

- name: Run Ambari Server setup
  no_log: true
  ansible.builtin.command:
    cmd: >-
      /usr/sbin/ambari-server setup -s
      {{ ambari_server_java_options | default("") }}
      {{ ambari_server_database_options | default("") }}
  changed_when: false
  notify: Restart ambari-server

- name: Update ambari-server log dir
  ansible.builtin.lineinfile:
    path: /etc/ambari-server/conf/log4j.properties
    regexp: '^ambari.log.dir='
    line: 'ambari.log.dir={{ base_log_dir }}/ambari-server'
    mode: '0644'
  notify: Restart ambari-server

- name: Increase the Ambari Server startup timeout
  ansible.builtin.lineinfile:
    path: /etc/ambari-server/conf/ambari.properties
    regexp: '^server.startup.web.timeout='
    line: 'server.startup.web.timeout=120'
    state: present
    mode: '0600'
  notify: Restart ambari-server

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Make sure the ambari-server service is started and enabled
  ansible.builtin.service:
    name: ambari-server
    state: started
    enabled: true
