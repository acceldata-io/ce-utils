---
- name: Load variables
  ansible.builtin.include_vars: "{{ lookup('ansible.builtin.first_found', config_vars_params) }}"
  vars:
    config_vars_params:
      files:
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
        - defaults.yml
      paths:
        - "{{ role_path }}/vars"

- name: Set the GPL Licensed setting in Ambari
  ansible.builtin.lineinfile:
    path: /etc/ambari-server/conf/ambari.properties
    backup: false
    state: present
    regexp: "^gpl.license.accepted.*"
    line: "gpl.license.accepted={{ (accept_gpl | default(false) | bool) | ternary('true', 'false') }}"
    mode: '0600'
  notify: Restart ambari-server

- name: Attempt to change the default Ambari admin password
  ansible.builtin.uri:
    url: http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/users/admin
    method: PUT
    force_basic_auth: true
    user: "{{ ambari_admin_user }}"
    password: "{{ ambari_admin_default_password }}"
    headers: '{"X-Requested-By":"ambari"}'
    body: " {\"Users\":{ \"password\":\"{{ ambari_admin_password }}\", \"old_password\":\"{{ ambari_admin_default_password }}\"}}"
    body_format: raw
    status_code: 200,201,202,403
    return_content: false
  no_log: true
  when: ambari_admin_user == 'admin' and ambari_admin_password != ambari_admin_default_password

- name: Check for existing ODP Version Definition in Ambari
  ansible.builtin.uri:
    url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/version_definitions?VersionDefinition/release/version={{ odp_version }}"
    method: GET
    force_basic_auth: true
    user: "{{ ambari_admin_user }}"
    password: "{{ ambari_admin_password }}"
    headers: '{"X-Requested-By":"ambari"}'
    status_code: 200,201,202
    return_content: true
  no_log: true
  register: ambari_config_existing_vdf
  when: install_odp is defined and install_odp

- name: Register ODP Version Definition with Ambari
  when:
    - install_odp is defined and install_odp
    - (ambari_config_existing_vdf.content | from_yaml)['items'] | length == 0
  block:
    - name: Render the ODP Version Definition XML
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "/tmp/cluster_vdf.xml"
        mode: '0640'
        force: true
      vars:
        vdf_template_params:
          files:
            - "vdf-ODP-{{ odp_version }}.xml.j2"
            - "vdf-ODP-{{ odp_minor_version }}-latest.xml.j2"
            - "vdf-ODP-{{ odp_major_version }}-latest.xml.j2"
          paths:
            - "{{ role_path }}/templates"
      loop:
        - "{{ lookup('ansible.builtin.first_found', vdf_template_params) }}"

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Start temporary HTTP server to serve VDF file
      ansible.builtin.shell:
        cmd: "cd /tmp && nohup python3 -m http.server 18484 > /dev/null 2>&1 & echo $!"  # noqa: command-instead-of-shell
      register: ambari_config_vdf_http_server
      changed_when: false

    - name: Wait for temporary HTTP server to be ready
      ansible.builtin.wait_for:
        port: 18484
        host: 127.0.0.1
        delay: 1
        timeout: 10

    - name: Register the VDF with Ambari
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/version_definitions"
        method: POST
        force_basic_auth: true
        user: "{{ ambari_admin_user }}"
        password: "{{ ambari_admin_password }}"
        headers: '{"X-Requested-By":"ambari"}'
        body: " {\"VersionDefinition\":{ \"version_url\":\"http://localhost:18484/cluster_vdf.xml\"}}"
        body_format: raw
        status_code: 200,201,202
        return_content: false
      no_log: true
  always:
    - name: Stop temporary HTTP server
      ansible.builtin.command:
        cmd: "kill {{ ambari_config_vdf_http_server.stdout }}"
      changed_when: false
      failed_when: false
      when:
        - ambari_config_vdf_http_server is defined
        - ambari_config_vdf_http_server.stdout is defined

    - name: Remove temporary VDF file
      ansible.builtin.file:
        path: /tmp/cluster_vdf.xml
        state: absent
      failed_when: false

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Configure custom repository URLs
  when: not (ambari_managed_repositories | default(True))
  block:
    - name: Generate repo_version API request body from template
      ansible.builtin.template:
        src: "{{ repo_version_template | default('repo_version_template.json.j2') }}"
        dest: /tmp/repo_version_update_body.json
        mode: '0640'
      become: false
      delegate_to: localhost

    - name: Update repo_version model to set ambari_managed_repositories=false
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/stacks/ODP/versions/{{ odp_minor_version }}/repository_versions/1"
        method: PUT
        force_basic_auth: true
        user: "{{ ambari_admin_user }}"
        password: "{{ ambari_admin_password }}"
        headers:
          "X-Requested-By": "ambari"
          "Content-type": "Application/json"
        body: "{{ lookup('file', '/tmp/repo_version_update_body.json') | to_json }}"
        status_code: 200
      no_log: true

    - name: Remove temporary repo version request body
      ansible.builtin.file:
        path: /tmp/repo_version_update_body.json
        state: absent
      become: false
      delegate_to: localhost

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Make sure all of the Ambari Agents have registered
  vars:
    ambari_config_expected_agents: "{{ groups['hadoop-cluster'] | map('extract', hostvars, 'ansible_fqdn') | map('lower') | list }}"
    ambari_config_hosts_items: "{{ (ambari_config_hosts.content | default('{}') | from_json)['items'] | default([]) }}"
    ambari_config_registered_agents: "{{ ambari_config_hosts_items | map(attribute='Hosts.host_name') | map('lower') | list }}"
    ambari_config_missing_agents: "{{ ambari_config_expected_agents | difference(ambari_config_registered_agents) }}"
  block:
    - name: Poll Ambari for the list of registered agents
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/hosts"
        method: GET
        force_basic_auth: true
        user: "{{ ambari_admin_user }}"
        password: "{{ ambari_admin_password }}"
        headers: '{"X-Requested-By":"ambari"}'
        status_code: [200, 401, 403]
        return_content: true
      register: ambari_config_hosts
      no_log: true
      # Fail fast on auth (401/403); otherwise retry until every expected agent is in Ambari's host list.
      until: >-
        ambari_config_hosts.status in [401, 403]
        or (ambari_config_hosts.status == 200 and ambari_config_missing_agents | length == 0)
      retries: 150
      delay: 2

    - name: Fail fast if Ambari rejected credentials
      ansible.builtin.fail:
        msg: "Ambari returned HTTP {{ ambari_config_hosts.status }} — check ambari_admin_user / ambari_admin_password."
      when: ambari_config_hosts.status in [401, 403]

  rescue:
    - name: List hosts that failed to register
      ansible.builtin.debug:
        msg: "MISSING — inventory={{ item }}, fqdn={{ hostvars[item].ansible_fqdn | lower }}"
      loop: "{{ groups['hadoop-cluster'] }}"
      when: (hostvars[item].ansible_fqdn | lower) in ambari_config_missing_agents

    - name: Grab last 30 lines of ambari-agent.log from each missing host
      ansible.builtin.shell: |
        set -o pipefail
        tail -n 30 /var/log/ambari-agent/ambari-agent.log 2>/dev/null || echo "(log not readable)"
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      become: true
      register: ambari_config_agent_tails
      changed_when: false
      failed_when: false
      loop: "{{ groups['hadoop-cluster'] }}"
      when: (hostvars[item].ansible_fqdn | lower) in ambari_config_missing_agents

    - name: Print agent log tails
      ansible.builtin.debug:
        msg: |
          === {{ item.item }} (fqdn={{ hostvars[item.item].ansible_fqdn | lower }}) ===
          {{ item.stdout | default('(no output)') }}
      loop: "{{ ambari_config_agent_tails.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when: not (item.skipped | default(false))

    - name: Fail with summary
      ansible.builtin.fail:
        msg: >-
          Ambari agent registration failed after {{ 150 * 2 }}s.
          Missing agents: {{ ambari_config_missing_agents | join(', ') }}.
          Last Ambari response status: {{ ambari_config_hosts.status | default('n/a') }}.
          See per-host ambari-agent.log tails above for root cause.
