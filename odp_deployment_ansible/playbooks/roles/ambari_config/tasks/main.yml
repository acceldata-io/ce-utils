---
- name: Load variables
  ansible.builtin.include_vars: "{{ lookup('ansible.builtin.first_found', config_vars_params) }}"
  vars:
    config_vars_params:
      files:
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
        - defaults.yml
      paths:
        - "{{ role_path }}/vars"

- name: Set the GPL Licensed setting in Ambari
  ansible.builtin.lineinfile:
    path: /etc/ambari-server/conf/ambari.properties
    backup: false
    state: present
    regexp: "^gpl.license.accepted.*"
    line: "gpl.license.accepted={{ (accept_gpl | default(false) | bool) | ternary('true', 'false') }}"
    mode: '0600'
  notify: Restart ambari-server

- name: Attempt to change the default Ambari admin password
  ansible.builtin.uri:
    url: http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/users/admin
    method: PUT
    force_basic_auth: true
    user: "{{ ambari_admin_user }}"
    password: "{{ ambari_admin_default_password }}"
    headers: '{"X-Requested-By":"ambari"}'
    body: " {\"Users\":{ \"password\":\"{{ ambari_admin_password }}\", \"old_password\":\"{{ ambari_admin_default_password }}\"}}"
    body_format: raw
    status_code: 200,201,202,403
    return_content: false
  no_log: true
  when: ambari_admin_user == 'admin' and ambari_admin_password != ambari_admin_default_password

- name: Upload ODP version definition file
  when: install_odp is defined and install_odp
  block:
    - name: Render the ODP Version Definition XML
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "/tmp/cluster_vdf.xml"
        mode: '0640'
        force: true
      vars:
        vdf_template_params:
          files:
            - "vdf-ODP-{{ odp_version }}.xml.j2"
            - "vdf-ODP-{{ odp_minor_version }}-latest.xml.j2"
            - "vdf-ODP-{{ odp_major_version }}-latest.xml.j2"
          paths:
            - "{{ role_path }}/templates"
      loop:
        - "{{ lookup('ansible.builtin.first_found', vdf_template_params) }}"

    - name: Enable User Home Directory Creation
      ansible.builtin.lineinfile:
        path: /etc/ambari-server/conf/ambari.properties
        regexp: "^{{ item.split('=')[0] }}="
        line: "{{ item }}"
        state: present
        mode: '0600'
      notify: Restart ambari-server
      loop:
        - "ambari.post.user.creation.hook.enabled=true"
        - "ambari.post.user.creation.hook=/var/lib/ambari-server/resources/scripts/post-user-creation-hook.sh"

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Register version definition with Ambari
  block:
    - name: Attempt to get an existing VDF for the required version
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/version_definitions?VersionDefinition/release/version={{ odp_version }}"
        method: GET
        force_basic_auth: true
        user: "{{ ambari_admin_user }}"
        password: "{{ ambari_admin_password }}"
        headers: '{"X-Requested-By":"ambari"}'
        status_code: 200,201,202
        return_content: true
      no_log: true
      register: ambari_config_existing_vdf

    - name: Start temporary HTTP server to serve VDF file
      ansible.builtin.shell:
        cmd: "cd /tmp && nohup python3 -m http.server 18484 > /dev/null 2>&1 &"  # noqa: command-instead-of-shell
      changed_when: false
      when: (ambari_config_existing_vdf.content | from_yaml)['items'] | length == 0

    - name: Wait for temporary HTTP server to be ready
      ansible.builtin.wait_for:
        port: 18484
        host: 127.0.0.1
        delay: 1
        timeout: 10
      when: (ambari_config_existing_vdf.content | from_yaml)['items'] | length == 0

    - name: Register the VDF with Ambari
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/version_definitions"
        method: POST
        force_basic_auth: true
        user: "{{ ambari_admin_user }}"
        password: "{{ ambari_admin_password }}"
        headers: '{"X-Requested-By":"ambari"}'
        body: " {\"VersionDefinition\":{ \"version_url\":\"http://localhost:18484/cluster_vdf.xml\"}}"
        body_format: raw
        status_code: 200,201,202
        return_content: false
      no_log: true
      when: (ambari_config_existing_vdf.content | from_yaml)['items'] | length == 0
  always:
    - name: Stop temporary HTTP server
      ansible.builtin.shell:
        cmd: "kill $(lsof -t -i:18484) 2>/dev/null || true"  # noqa: command-instead-of-shell
      changed_when: false
      failed_when: false

    - name: Remove temporary VDF file
      ansible.builtin.file:
        path: /tmp/cluster_vdf.xml
        state: absent

- name: Configure custom repository URLs
  when: not (ambari_managed_repositories | default(True))
  block:
    - name: Generate repo_version API request body from template
      ansible.builtin.template:
        src: "{{ repo_version_template | default('repo_version_template.json.j2') }}"
        dest: /tmp/repo_version_update_body.json
        mode: '0640'
      become: false
      delegate_to: localhost

    - name: Update repo_version model to set ambari_managed_repositories=false
      ansible.builtin.uri:
        url: "http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/stacks/ODP/versions/{{ odp_minor_version }}/repository_versions/1"
        method: PUT
        force_basic_auth: true
        user: "{{ ambari_admin_user }}"
        password: "{{ ambari_admin_password }}"
        headers:
          "X-Requested-By": "ambari"
          "Content-type": "Application/json"
        body: "{{ lookup('file', '/tmp/repo_version_update_body.json') | to_json }}"
        status_code: 200
      no_log: true

    - name: Remove temporary repo version request body
      ansible.builtin.file:
        path: /tmp/repo_version_update_body.json
        state: absent
      become: false
      delegate_to: localhost

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Make sure all of the Ambari Agents have registered
  ansible.builtin.uri:
    url: http://{{ ansible_fqdn }}:{{ ambari_server_port }}/api/v1/hosts/{{ hostvars[item]['ansible_fqdn'] | lower }}
    method: GET
    force_basic_auth: true
    user: "{{ ambari_admin_user }}"
    password: "{{ ambari_admin_password }}"
    headers: '{"X-Requested-By":"ambari"}'
    status_code: 200,404
    return_content: false
  no_log: true
  loop: "{{ groups['hadoop-cluster'] }}"
  register: ambari_config_result
  # Only 200 means "registered"; 404 means "still coming up" → retry.
  # Any other status (5xx, auth failure) falls through and fails the task immediately.
  until: ambari_config_result.status == 200
  retries: 60
  delay: 5
