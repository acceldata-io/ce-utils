---
- name: Load variables
  ansible.builtin.include_vars: "{{ lookup('ansible.builtin.first_found', common_vars_params) }}"
  vars:
    common_vars_params:
      files:
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}-{{ ansible_distribution_version }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
        - defaults.yml
      paths:
        - "{{ role_path }}/vars"

- name: Install required packages (only if missing)
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present

- name: Install Python DB libraries for Ansible modules
  ansible.builtin.pip:
    name: "{{ common_pip_packages }}"
    executable: "{{ common_pip_executable | default('pip3') }}"
    state: present
  when: common_pip_packages is defined and common_pip_packages | length > 0

- name: Install Java
  ansible.builtin.include_tasks: java.yml
  when: java != "embedded"

- name: Check if chronyd service exists
  ansible.builtin.service_facts:

- name: Make sure chronyd is started and enabled (if installed)
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true
  register: common_chronyd_result
  when: "'chronyd.service' in ansible_facts.services"
  failed_when: >-
    common_chronyd_result is failed and
    'Could not find' not in (common_chronyd_result.msg | default(''))

- name: Add mappings to /etc/hosts
  vars:
    # Prefer the host's default-route IPv4; fall back to the inventory ansible_host value
    # when the target has multiple NICs / no default route (ansible_default_ipv4 undefined).
    common_hosts_ip: "{{ hostvars[item].ansible_default_ipv4.address | default(hostvars[item].ansible_host | default('')) }}"
    common_hosts_name: "{{ hostvars[item].ansible_fqdn | default(hostvars[item].ansible_nodename) }}"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^{{ common_hosts_ip }}.*"
    line: "{{ common_hosts_ip }} {{ common_hosts_name }}"
    insertafter: "^127..*$"
    state: present
    mode: '0644'
  loop: "{{ groups['hadoop-cluster'] | sort(reverse=True) }}"
  when: not external_dns and common_hosts_ip | length > 0

- name: Disable firewall service
  when: disable_firewall and common_firewall_service_name is defined
  block:
    - name: Stop the firewall service
      ansible.builtin.service:
        name: "{{ common_firewall_service_name }}"
        state: stopped
      register: common_firewall_stop_result
      failed_when: >-
        common_firewall_stop_result is failed and
        'Could not find' not in (common_firewall_stop_result.msg | default(''))

    - name: Disable the firewall service
      ansible.builtin.service:
        name: "{{ common_firewall_service_name }}"
        enabled: false
      register: common_firewall_disable_result
      failed_when: >-
        common_firewall_disable_result is failed and
        'Could not find' not in (common_firewall_disable_result.msg | default(''))

- name: Disable SELinux
  # Intentionally avoid ansible.posix.selinux: that module requires the libselinux
  # Python bindings, and on RHEL/Rocky 9 those only ship for the system python3,
  # not for /usr/bin/python3.11 (which this playbook uses). Using plain command +
  # lineinfile here is binding-free and reboot-equivalent.
  when: disable_selinux | default(false) | bool
  block:
    - name: Set SELinux to permissive at runtime (no reboot needed)
      ansible.builtin.command: setenforce 0
      register: common_selinux_setenforce
      changed_when: common_selinux_setenforce.rc == 0
      failed_when:
        - common_selinux_setenforce.rc != 0
        - "'SELinux is disabled' not in (common_selinux_setenforce.stderr | default(''))"

    - name: Persist SELinux=disabled in /etc/selinux/config (takes effect on next reboot)
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=disabled'
        state: present
        mode: '0644'

- name: Read current THP enabled state
  ansible.builtin.slurp:
    src: /sys/kernel/mm/transparent_hugepage/enabled
  register: common_thp_enabled_current
  when: disable_thp | default(false) | bool

- name: Disable Transparent Huge Pages (enabled)
  ansible.builtin.shell:
    cmd: echo never > /sys/kernel/mm/transparent_hugepage/enabled
  changed_when: "'[never]' not in (common_thp_enabled_current.content | b64decode)"
  when: >-
    disable_thp | default(false) | bool and
    '[never]' not in (common_thp_enabled_current.content | b64decode)

- name: Read current THP defrag state
  ansible.builtin.slurp:
    src: /sys/kernel/mm/transparent_hugepage/defrag
  register: common_thp_defrag_current
  when: disable_thp | default(false) | bool

- name: Disable Transparent Huge Pages (defrag)
  ansible.builtin.shell:
    cmd: echo never > /sys/kernel/mm/transparent_hugepage/defrag
  changed_when: "'[never]' not in (common_thp_defrag_current.content | b64decode)"
  when: >-
    disable_thp | default(false) | bool and
    '[never]' not in (common_thp_defrag_current.content | b64decode)

- name: Persist THP disable across reboots
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/disable-thp.conf
    content: |
      w /sys/kernel/mm/transparent_hugepage/enabled - - - - never
      w /sys/kernel/mm/transparent_hugepage/defrag - - - - never
    mode: '0644'
    owner: root
    group: root
  when: disable_thp | default(false) | bool

- name: Set timezone - {{ timezone }}
  community.general.timezone:
    name: "{{ timezone }}"
  when: set_timezone | default(false) | bool

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
